# nginx.conf

# Basic settings for worker processes and connections
worker_processes auto; # Use number of available cores
pid /run/nginx.pid;

events {
    worker_connections 1024; # Max connections per worker
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Define the upstream group of Flask application servers
    # Docker Compose will make the service 'app' resolvable to the container IPs

    upstream fastapi_app {
    least_conn;
    server app:8000;
    }

    server {
        listen 80; # Listen on port 80 (standard HTTP) inside the Nginx container
        server_name localhost; # Or your domain name

        # Increase max body size for file uploads (match Flask's MAX_CONTENT_LENGTH)
        client_max_body_size 200M;

        location / {
            # Pass requests to the upstream FastAPI app group
            proxy_pass http://fastapi_app;

            # Set headers to pass necessary information to the Flask app
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Optional: Adjust proxy timeouts if needed for long OCR processing
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }

        # Optional: Add location block for static files if you want Nginx to serve them directly
        # location /static {
        #     alias /app/static; # Assuming static files are at /app/static in the app container
        #     # This requires sharing the static volume or building static files into the Nginx image
        # }
    }
}