# docker-compose.yml
# Using version 3.3 for compatibility with older Docker Compose installations
# Scaling will be handled by the --scale flag in the docker-compose up command.
version: '3.8'

services:
  # The Flask Application Service
  # Compose will automatically create unique container names for scaled instances
  # e.g., projectname_app_1, projectname_app_2, etc.
  app:
    build:
      context: .          # Directory containing Dockerfile.app and application code
      dockerfile: Dockerfile.app # Specify the Dockerfile for the app
    # Optionally specify image name for registry push/pull:
    # image: your-dockerhub-username/ocr-app:latest
    # restart: unless-stopped # Optional: Restart policy for the containers
    env_file:
      - .env            # Load environment variables from the .env file
    # Volumes (optional, only if needed for persistence beyond container life)
    # volumes:
      # - ./uploads:/app/uploads # Example: Persist the uploads directory (usually not needed for temp files)
    networks:
      - ocr_network     # Connect this service to the custom network

    #The Nginx Load Balancer Service
  # Acts as the single entry point and distributes requests to 'app' instances.
  nginx:
    image: nginx:1.25-alpine # Use a specific, stable version of the official Nginx image
    container_name: ocr_nginx_lb # Custom name is okay for this single instance service
    # restart: unless-stopped # Optional: Restart policy
    ports:
      - "8001:80"       # Map HOST Port 8001 -> Nginx Container Port 80
                        # Access the clustered app via http://<your-host-ip>:8001
    volumes:
      # Mount the custom Nginx configuration file into the container (read-only)
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - ocr_network     # Connect Nginx to the same network as the app services
    depends_on:
      - app             # Ensures 'app' service(s) are started before Nginx
                        # Note: Doesn't guarantee app readiness, only startup order.

# Define the custom network for services to communicate
networks:
  ocr_network:
    driver: bridge      # Use the standard bridge network driver